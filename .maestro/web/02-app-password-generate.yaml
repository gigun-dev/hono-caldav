appId: com.android.chrome
tags:
  - web
---
# App Password 生成フロー

- openLink: ${SERVER_URL}/demo

- assertVisible: CalDAV Dashboard

# App Password を生成
- tapOn: 新しい App Password を生成

# 生成されたパスワードが表示される
- assertVisible: App Password (一度だけ表示)
- assertVisible:
    id: generated-password-value

# パスワードの値をコピー
- copyTextFrom:
    id: generated-password-value
