appId: com.apple.reminders
tags:
  - ios
---
# リマインダーアプリでデモタスクの同期を確認
# 事前条件: 01 で CalDAV アカウント追加済み

- startRecording: "02-reminders-sync.mp4"

- launchApp:
    clearState: false

# ダイアログ（リセット後は毎回表示される）
- tapOn:
    text: 続ける
    optional: true
- tapOn:
    text: 今はしない
    optional: true
- tapOn:
    text: 続ける
    optional: true
- tapOn:
    text: 許可
    optional: true

# デモデータの VTODO カレンダーが表示される
- assertVisible: 仕事
- assertVisible: プライベート

# 仕事カレンダーのタスクを確認
- tapOn: 仕事
- assertVisible: 週次レポート作成
- assertVisible: クライアントMTG準備

- tapOn:
    id: BackButton

# プライベートカレンダーのタスクを確認
- tapOn: プライベート
- assertVisible: スーパーで買い物
- assertVisible: ジムに行く
- assertVisible: 本を読む

- tapOn:
    id: BackButton

- tapOn: 実行済み
- assertVisible: コードレビュー

- stopRecording
