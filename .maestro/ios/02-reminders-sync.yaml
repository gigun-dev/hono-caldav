appId: com.apple.reminders
tags:
  - ios
---
# Verify demo tasks sync via Reminders app
# Prerequisite: CalDAV account added in 01

- startRecording: "02-reminders-sync"

- launchApp:
    clearState: false

# Dialogs (shown after every reset)
- tapOn:
    text: ${MAESTRO_L_CONTINUE}
    optional: true
- tapOn:
    text: ${MAESTRO_L_NOT_NOW}
    optional: true
- tapOn:
    text: ${MAESTRO_L_CONTINUE}
    optional: true
- tapOn:
    text: ${MAESTRO_L_ALLOW}
    optional: true

# iCloud Syncing dialog may appear after initial dialogs
- tapOn:
    text: ${MAESTRO_L_NOT_NOW}
    optional: true

# Demo VTODO calendars should be visible (wait for sync)
- extendedWaitUntil:
    visible: 仕事
    timeout: 30000
- assertVisible: プライベート

# Check tasks in 仕事 calendar
- tapOn: 仕事
- assertVisible: 週次レポート作成
- assertVisible: クライアントMTG準備

- tapOn:
    id: BackButton

# Check tasks in プライベート calendar
- tapOn: プライベート
- assertVisible: スーパーで買い物
- assertVisible: ジムに行く
- assertVisible: 本を読む

- tapOn:
    id: BackButton

- tapOn: ${MAESTRO_L_COMPLETED}
- assertVisible: コードレビュー

- stopRecording
