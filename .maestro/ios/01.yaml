appId: com.apple.Preferences
tags:
  - ios
env:
  SERVER_URL: https://workers-ci.097969.xyz
---
# Settings → CalDAV account setup
# MAESTRO_DEMO_EMAIL, MAESTRO_DEMO_APP_PASSWORD are auto-read from .env.e2e

- startRecording: "01-account-setup"

- launchApp:
    clearState: false

- scrollUntilVisible:
    element: ${MAESTRO_L_APPS}
- tapOn:
    id: com.apple.settings.apps

- extendedWaitUntil:
    visible:
      id: com.apple.mobilecal
    timeout: 15000
- tapOn:
    id: com.apple.mobilecal

# No accounts: ADD_ACCOUNT shown directly → add subscribed calendar first
- runFlow:
    file: helpers/add-holiday-calendar.yaml
    when:
      notVisible:
        id: ACCOUNTS

# Accounts exist: navigate via ACCOUNTS → ADD_ACCOUNT
- tapOn:
    id: ACCOUNTS
- tapOn:
    id: ADD_ACCOUNT
- tapOn: ${MAESTRO_L_ADD_OTHER_ACCOUNT}
- scrollUntilVisible:
    element: ${MAESTRO_L_CALDAV_ACCOUNT}
- tapOn: ${MAESTRO_L_CALDAV_ACCOUNT}

- tapOn:
    id: HOST
- inputText: ${SERVER_URL}

- tapOn:
    id: USERNAME
- inputText: ${MAESTRO_DEMO_EMAIL}

- tapOn:
    id: PASSWORD
- inputText: ${MAESTRO_DEMO_APP_PASSWORD}

- tapOn: ${MAESTRO_L_NEXT}
- extendedWaitUntil:
    visible: ${MAESTRO_L_SAVE}
    timeout: 30000
- tapOn: ${MAESTRO_L_SAVE}

- stopRecording
