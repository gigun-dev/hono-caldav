appId: com.apple.Preferences
tags:
  - ios
env:
  SERVER_URL: ${MAESTRO_SERVER_URL}
---
# Settings → CalDAV account setup
# Prerequisite: erase-simulator has seeded a subscribed calendar via DB INSERT
#   so that "Calendar Accounts" (ACCOUNTS) section is visible.
# MAESTRO_DEMO_EMAIL, MAESTRO_DEMO_APP_PASSWORD are auto-read from .env.e2e

- startRecording: "01-account-setup"

- launchApp:
    clearState: false

- scrollUntilVisible:
    element:
      id: com.apple.settings.apps
    timeout: 30000
- tapOn:
    id: com.apple.settings.apps

- extendedWaitUntil:
    visible:
      id: com.apple.mobilecal
    timeout: 15000
- tapOn:
    id: com.apple.mobilecal

# ACCOUNTS exists (seeded by erase-simulator) → navigate to ADD_ACCOUNT
- extendedWaitUntil:
    visible:
      id: ACCOUNTS
    timeout: 15000
- tapOn:
    id: ACCOUNTS
- tapOn:
    id: ADD_ACCOUNT
- tapOn: ${MAESTRO_L_ADD_OTHER_ACCOUNT}
- scrollUntilVisible:
    element: ${MAESTRO_L_CALDAV_ACCOUNT}
- tapOn: ${MAESTRO_L_CALDAV_ACCOUNT}

- tapOn:
    id: HOST
- inputText: ${SERVER_URL}

- tapOn:
    id: USERNAME
- inputText: ${MAESTRO_DEMO_EMAIL}

# Tap title bar to dismiss keyboard before PASSWORD.
# After USERNAME inputText, keyboard is still active and PASSWORD tap
# hits the label instead of the input field on fresh-erased simulators.
- tapOn: "CalDAV"
- tapOn:
    id: PASSWORD
- inputText: ${MAESTRO_DEMO_APP_PASSWORD}

- tapOn: ${MAESTRO_L_NEXT}
- extendedWaitUntil:
    visible: ${MAESTRO_L_SAVE}
    timeout: 240000
- tapOn:
    text: ${MAESTRO_L_SAVE}
    retryTapIfNoChange: true

- stopRecording
