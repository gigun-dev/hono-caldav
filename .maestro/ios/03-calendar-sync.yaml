appId: com.apple.mobilecal
tags:
  - ios
---
# Verify demo events sync via Calendar app
# Prerequisite: CalDAV account added in 01

- startRecording: "03-calendar-sync"

- launchApp:
    clearState: false

# Dialog (shown after every reset)
- tapOn:
    text: Allow
    optional: true

# Calendar list should show schedule calendar
- tapOn: Calendars
- tapOn:
    id: done-button
- extendedWaitUntil:
    visible:
      id: today-button
- tapOn:
    id: today-button
- tapOn:
    id: toggle-day-list-view
- tapOn:
    id: list-view

# Demo recurring events should exist
- assertVisible: チームスタンドアップ
- assertVisible: 1on1ミーティング

- stopRecording
