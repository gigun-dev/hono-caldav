appId: com.apple.mobilecal
tags:
  - ios
---
# Verify demo events sync via Calendar app
# Prerequisite: CalDAV account added in 01

- startRecording: "03-calendar-sync"

- launchApp:
    clearState: false

# Dialog (shown after every reset)
- tapOn:
    text: ${MAESTRO_L_ALLOW}
    optional: true

# Open calendar list and verify CalDAV calendar exists
- tapOn: ${MAESTRO_L_CALENDARS}
- extendedWaitUntil:
    visible: スケジュール
    timeout: 60000
- tapOn:
    id: done-button

# Switch to list view and check events
- extendedWaitUntil:
    visible:
      id: today-button
- tapOn:
    id: today-button
- tapOn:
    id: toggle-day-list-view
- tapOn:
    id: list-view

# Demo recurring events should exist
- extendedWaitUntil:
    visible: チームスタンドアップ
    timeout: 60000
- assertVisible: 1on1ミーティング

- stopRecording
