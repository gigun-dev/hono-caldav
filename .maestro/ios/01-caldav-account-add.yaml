appId: com.apple.Preferences
tags:
  - ios
---
# 設定 → CalDAV アカウント追加
# 事前条件: xcrun simctl erase 済み、demo ユーザー seed 済み

- launchApp:
    clearState: false

- scrollUntilVisible:
    element: アプリ
- tapOn:
    id: com.apple.settings.apps

- scrollUntilVisible:
    element: カレンダー
- tapOn:
    id: com.apple.mobilecal

- tapOn:
    id: ADD_ACCOUNT
- tapOn: リストから選択します。
- tapOn: その他のアカウントを追加…
- tapOn: CalDAVアカウント

- tapOn:
    id: HOST
- inputText: ${SERVER_URL}

- tapOn:
    id: USERNAME
- inputText: ${DEMO_EMAIL}

- tapOn:
    id: PASSWORD
- inputText: ${DEMO_APP_PASSWORD}

- tapOn: 終了
- tapOn: 保存
