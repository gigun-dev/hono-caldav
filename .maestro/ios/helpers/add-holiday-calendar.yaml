appId: com.apple.Preferences
---
# Add subscribed calendar (Japanese holidays)
- tapOn:
    id: ADD_ACCOUNT
- extendedWaitUntil:
    visible:
      text: choose from a list.
- tapOn: choose from a list.
- tapOn: Add Other Account…
- tapOn: Subscribed Calendar
- tapOn:
    id: HOST
- inputText: webcal://calendars.icloud.com/holidays/jp_ja.ics
- tapOn: Done
