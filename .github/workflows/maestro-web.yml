name: Maestro Web E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  maestro-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_ALLOWED_HOSTS: "localhost:8787,dev-worker.097969.xyz"
      BETTER_AUTH_PRODUCTION_URL: "https://caldav.gigun-dev.workers.dev"
      GOOGLE_CLIENT_ID: test
      GOOGLE_CLIENT_SECRET: test
      SERVER_URL: ${{ secrets.SERVER_URL }}
      DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
      DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
      DEMO_APP_PASSWORD: ${{ secrets.DEMO_APP_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared

      - name: Start servers + tunnel
        run: |
          make serve &
          cloudflared tunnel run --token ${{ secrets.CLOUDFLARED_TOKEN }} &
          sleep 5

      - name: Seed demo user
        run: make seed

      - name: Run Maestro Web tests
        run: make maestro-web-run
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-web-report
          path: |
            maestro-web-report.xml
            ~/.maestro/tests/**/*
