name: Maestro iOS E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  maestro-ios:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install cloudflared
        run: brew install cloudflared

      - name: Start servers + seed
        run: make up

      - name: Run Maestro iOS tests
        run: make e2e-ios

      - name: Stop servers
        if: always()
        run: make stop

      - name: Collect recordings
        if: always()
        run: |
          LATEST=$(ls -dt .maestro/tests/*/ 2>/dev/null | head -1)
          [ -n "$LATEST" ] && mv *.mp4 "$LATEST" 2>/dev/null || true

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-report
          path: .maestro/tests/
