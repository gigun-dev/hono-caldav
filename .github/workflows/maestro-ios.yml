name: Maestro iOS E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  maestro-ios:
    runs-on: macos-14
    timeout-minutes: 30
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      CLOUDFLARED_TOKEN: ${{ secrets.CLOUDFLARED_TOKEN }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Install Maestro
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install cloudflared
        run: brew install cloudflared

      - name: Boot iOS Simulator (Japanese locale)
        run: |
          DEVICE=$(xcrun simctl list devices available -j | \
            jq -r '.devices | to_entries[] | select(.key | contains("iOS")) | .value[] | select(.name == "iPhone 16") | .udid' | head -1)
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl list devices available -j | \
              jq -r '.devices | to_entries[] | select(.key | contains("iOS")) | .value[] | .udid' | head -1)
          fi
          xcrun simctl bootstatus "$DEVICE" -b
          xcrun simctl spawn "$DEVICE" defaults write -globalDomain AppleLanguages -array ja
          xcrun simctl spawn "$DEVICE" defaults write -globalDomain AppleLocale -string ja_JP
          xcrun simctl shutdown "$DEVICE"
          xcrun simctl bootstatus "$DEVICE" -b
          echo "Language: $(xcrun simctl spawn "$DEVICE" defaults read -globalDomain AppleLanguages)"
          echo "Locale: $(xcrun simctl spawn "$DEVICE" defaults read -globalDomain AppleLocale)"

      - name: Start servers + seed
        run: make up BG=1

      - name: Run Maestro iOS tests
        run: |
          maestro test \
            --debug-output . \
            .maestro/

      - name: Collect recordings
        if: always()
        run: |
          LATEST=$(ls -dt .maestro/tests/*/ 2>/dev/null | head -1)
          [ -n "$LATEST" ] && mv *.mp4 "$LATEST" 2>/dev/null || true

      - name: Stop servers
        if: always()
        run: make stop

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-report
          path: .maestro/tests/
